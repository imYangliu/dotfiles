# tmux defaults tuned for terminal-heavy development and Vim-style workflows.

# Terminal and color support.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB"
set -s focus-events on

# Lower latency for ESC-prefixed keys and repeated pane resizing.
set -sg escape-time 10
set -g repeat-time 600

# Sensible defaults for development sessions.
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi
set -g status-keys vi
set -g mouse on
set -g set-clipboard on

# Use C-a as the tmux prefix. Press C-a twice to send a literal C-a.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Keep new panes and windows in the current working directory.
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Fast config reload.
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Vim-style pane navigation and resizing.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window helpers.
bind Tab last-window
bind = select-layout even-horizontal
bind + select-layout even-vertical
bind m setw synchronize-panes

# Copy mode tuned for Vim users.
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Y send -X copy-line
bind -T copy-mode-vi / command-prompt -p "search down" "send -X search-forward '%%'"
bind -T copy-mode-vi ? command-prompt -p "search up" "send -X search-backward '%%'"
bind -T copy-mode-vi n send -X search-again
bind -T copy-mode-vi N send -X search-reverse
bind -T copy-mode WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode WheelDownPane select-pane \; send-keys -X -N 1 scroll-down
bind -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down

# Compact status line with enough context for remote work.
set -g status-interval 5
set -g status-left-length 24
set -g status-right-length 80
set -g status-style "fg=colour252,bg=colour234"
set -g message-style "fg=colour231,bg=colour31"
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour81"
# Keep colored segments in user options so tmux conditionals do not split on commas in styles.
set -g @status_prefix_segment "#[fg=colour16,bg=colour220,bold] PREFIX #[default] "
set -g @status_copy_segment "#[fg=colour16,bg=colour118,bold] COPY #[default] "
set -g status-left " #[fg=colour231,bg=colour31,bold] #S #[default]"
set -g status-right "#{?client_prefix,#{@status_prefix_segment},}#{?pane_in_mode,#{@status_copy_segment},}#H | %Y-%m-%d %H:%M "
setw -g window-status-format " #I:#W#{?window_zoomed_flag,[Z],} "
setw -g window-status-current-format "#[fg=colour16,bg=colour81,bold] #I:#W#{?window_zoomed_flag,[Z],} #[default]"

# Load local overrides when present.
if-shell "[ -f ~/.tmux.conf.local ]" "source-file ~/.tmux.conf.local"
