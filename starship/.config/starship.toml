# Starship default-style prompt shared by zsh and fish.
# Docs: https://starship.rs/config/

add_newline = true
command_timeout = 3000
scan_timeout = 30
format = "$username$hostname$directory$git_branch$git_status$fill$cmd_duration$jobs$status$line_break$character"
right_format = "$time"

[username]
show_always = true
format = "[$user]($style)@"
style_user = "bold cyan"
style_root = "bold red"

[hostname]
ssh_only = false
format = "[$hostname]($style) "
style = "bold cyan"

[directory]
style = "bold green"
truncation_length = 4
truncate_to_repo = false
read_only = " ro"

[git_branch]
format = " [$symbol$branch]($style)"
symbol = "git:"
style = "bold yellow"

[git_status]
format = "([$all_status$ahead_behind]($style))"
style = "bold red"

[fill]
symbol = " "

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "yellow"

[jobs]
format = "[$symbol$number]($style) "
symbol = "jobs:"
style = "bold blue"

[status]
disabled = false
format = "[$symbol$status]($style) "
symbol = "exit:"
style = "bold red"

[time]
disabled = false
format = "[$time]($style)"
time_format = "%H:%M"
style = "bright-black"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"
vimcmd_visual_symbol = "[❮](bold yellow)"
vimcmd_replace_symbol = "[❮](bold purple)"
vimcmd_replace_one_symbol = "[❮](bold purple)"
